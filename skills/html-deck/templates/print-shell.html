<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Presentation Title — Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #10b981;
      --accent4: #f59e0b;
      --danger: #ef4444;
      --text: #f0f0f8;
      --muted: #8888aa;
      --dim: #4a4a6a;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      font-family: var(--font);
      font-size: 16px;
      color: var(--text);
    }

    /* Each slide is exactly 1280×720 */
    .slide {
      width: 1280px;
      height: 720px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 60px;
      page-break-after: always;
      break-after: page;
    }

    /* Source footer on every slide */
    .slide::after {
      content: attr(data-source);
      position: absolute;
      bottom: 16px;
      left: 24px;
      font-size: 11px;
      color: var(--dim);
    }

    /* Slide number */
    .slide::before {
      content: attr(data-num);
      position: absolute;
      bottom: 16px;
      right: 24px;
      font-size: 11px;
      color: var(--dim);
      font-family: var(--mono);
    }

    /* Component classes — identical to deck */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    .ca { color: var(--accent); }
    .cs { color: var(--accent2); }

    .pill {
      display: inline-flex;
      align-items: center;
      background: rgba(124,58,237,.15);
      color: var(--accent);
      border: 1px solid rgba(124,58,237,.3);
      padding: 4px 14px;
      border-radius: 99px;
      font-size: .8em;
      font-weight: 500;
    }

    .codeblock {
      font-family: var(--mono);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      font-size: .82em;
      overflow: hidden;
      line-height: 1.6;
    }

    .flow { display: flex; align-items: center; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; }
    .g5 { display: grid; grid-template-columns: repeat(5, 1fr); }

    .sl { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; }
    .slb { color: var(--accent2); }
    .slg { color: var(--accent3); }
    .slr { color: var(--danger); }

    /* Print config */
    @media print {
      body { background: none; }
      .slide { margin: 0; }
      @page { size: 1280px 720px; margin: 0; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       SLIDES — same content as deck but fixed 1280×720px
       Add data-source="Conference · Year" and data-num="1 / N"
       ============================================================ -->

  <div class="slide" data-source="Conference · Year" data-num="1 / N">
    <h1 style="font-size:52px; font-weight:900;">Slide 1</h1>
    <p style="color:var(--muted);">Replace with title slide content</p>
  </div>

  <div class="slide" data-source="Conference · Year" data-num="2 / N">
    <h2 style="font-size:40px; font-weight:800; margin-bottom:24px;">Slide 2</h2>
    <p style="color:var(--muted);">Replace with content</p>
  </div>

  <!-- Add more slides here -->

</body>
</html>
